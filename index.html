<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SBP662 HMI Training Demo v5.9</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#2a2a2a;font-family:'Segoe UI',Tahoma,sans-serif;margin:0}
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;

const C = {
  hdr:"#0e2d0a", tabOn:"#50c850", tabOff:"#1f371d", body:"#f0f0f0",
  motor:"#98e030", blu:"#24248a", grn:"#40a840", ylw:"#e0e000",
  red:"#982828", cya:"#06d8d8", pur:"#7030a0", amb:"#c09020",
  wh:"#fff", bk:"#000", brd:"#808080", stYlw:"#c0d820", stRed:"#c03030", buzz:"#c89830",
  navOn:"#e0e0e0", navOff:"#505050", subOn:"#f0f0f0", subOff:"#b0b0b0"
};

function Btn({t,c=C.grn,onClick,s}){
  const [hv,setHv]=useState(false);
  const [on,setOn]=useState(false);
  const handleClick=()=>{setOn(p=>!p);onClick&&onClick();};
  return <div style={{padding:s?"3px 6px":"5px 10px",background:on?"#98e030":c,
    filter:hv?"brightness(1.15)":"none",
    color:on?"#000":C.wh,border:s?"1px solid rgba(0,0,0,0.4)":"2px solid rgba(0,0,0,0.35)",fontWeight:700,fontSize:s?10:12,
    cursor:"pointer",textAlign:"center",lineHeight:s?"12px":"14px",borderRadius:1,
    minWidth:s?55:80,minHeight:s?26:36,display:"inline-flex",flexDirection:"column",
    alignItems:"center",justifyContent:"center",whiteSpace:"pre-wrap",
    boxShadow:"1px 1px 0 rgba(0,0,0,0.15)",
    transition:"background 0.1s",userSelect:"none"}}
    onClick={handleClick} onMouseEnter={()=>setHv(true)} onMouseLeave={()=>setHv(false)}>{t}</div>;
}

function MB({id,nm,on,onClick}){
  return <div style={{display:"inline-flex",flexDirection:"column",alignItems:"center",
    justifyContent:"center",padding:"2px 3px",minWidth:95,minHeight:34,
    background:on?"#80c020":C.motor,border:"2px solid #777",cursor:"pointer",
    fontSize:10,fontWeight:700,textAlign:"center",lineHeight:"12px"}}
    onClick={()=>onClick&&onClick(id)}>
    <span style={{fontSize:8,color:"#555"}}>{id}</span>
    <span style={{color:"#111"}}>{nm}</span>
  </div>;
}

function IF({v,w=60}){
  const [val,setVal]=useState(v!=null?String(v):"");
  useEffect(()=>{setVal(v!=null?String(v):"");},[v]);
  return <input style={{width:w,padding:"2px 4px",border:"1px solid #a0a0a0",
    background:C.wh,fontSize:11,textAlign:"right"}}
    value={val} onChange={e=>setVal(e.target.value)}/>;
}

function SubTabs({tabs,active,onSelect}){
  return <div style={{display:"flex",gap:0,marginBottom:6,borderBottom:"1px solid "+C.brd}}>
    {tabs.map(t=><div key={t} onClick={()=>onSelect(t)}
      style={{padding:"4px 12px",fontSize:11,fontWeight:active===t?700:400,
        border:"1px solid "+C.brd,borderBottom:active===t?"2px solid "+C.body:"1px solid "+C.brd,
        background:active===t?C.body:"#b8b8b8",cursor:"pointer",borderRadius:"2px 2px 0 0",marginBottom:-1}}>{t}</div>)}
  </div>;
}

function NavPanel({items,active,onSelect}){
  return <div style={{width:110,display:"flex",flexDirection:"column",gap:2}}>
    {items.map(n=><div key={n} onClick={()=>onSelect(n)}
      style={{padding:"6px 4px",background:active===n?"#e8e8e8":"#3a3a3a",
        color:active===n?C.bk:C.wh,border:"2px solid "+C.brd,
        fontWeight:700,fontSize:11,cursor:"pointer",textAlign:"center",
        whiteSpace:"pre-wrap",lineHeight:"14px"}}>{n}</div>)}
  </div>;
}

function PRow({l,v,u}){
  return <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:3}}>
    <span style={{fontWeight:700,fontSize:10,minWidth:200}}>{l}</span>
    <IF v={v} w={70}/><span style={{fontSize:9}}>{u||"mm"}</span>
  </div>;
}

function StepsPanel(){
  return <div style={{border:"1px solid "+C.brd,background:C.wh,fontSize:11,width:180}}>
    <div style={{display:"flex",fontWeight:700,padding:"4px 6px",background:"#d0d0d0",borderBottom:"1px solid "+C.brd}}>
      <span style={{width:45}}>Steps</span><span>State</span></div>
    <div style={{maxHeight:550,overflow:"auto"}}>
      {Array.from({length:25},(_,i)=>25-i).map(n=>
        <div key={n} style={{display:"flex",padding:"3px 6px",background:n%2===0?"#f4f4f4":C.wh,borderBottom:"1px solid #e8e8e8"}}>
          <span style={{width:45,fontWeight:700}}>{n}</span><span style={{color:"#555"}}>NO WAFER /</span></div>)}
    </div>
  </div>;
}

// ══════ 1. USER ══════
function UserTab(){
  return <div style={{padding:"20px 30px",minHeight:520,position:"relative"}}>
    <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>USER LEVEL</div>
    <input type="password" defaultValue="*" style={{width:200,padding:"4px 8px",fontSize:14,border:"1px solid "+C.brd}}/>
    {/* Power button - bottom left */}
    <div style={{position:"absolute",bottom:60,left:60,display:"flex",alignItems:"center",gap:4}}>
      <div style={{width:60,height:60,borderRadius:"50%",border:"3px solid #40c040",display:"flex",
        alignItems:"center",justifyContent:"center",cursor:"pointer",background:"transparent"}}>
        <span style={{fontSize:32,color:"#40c040",lineHeight:1}}>⏻</span></div>
      <span style={{fontSize:11,fontWeight:700,color:"#40c040"}}>Power</span></div>
    {/* Right side buttons */}
    <div style={{position:"absolute",right:30,top:200,display:"flex",flexDirection:"column",gap:8}}>
      <Btn t="EventLog(USB)" c={C.grn}/><Btn t="RemoveUSB" c={C.red}/></div>
    <div style={{position:"absolute",right:30,top:340}}>
      <Btn t="SoftVer" c={C.amb}/></div>
    {/* Version - bottom right */}
    <div style={{position:"absolute",bottom:40,right:30}}>
      <div style={{fontWeight:700,fontSize:12,marginBottom:4}}>Version</div>
      <div style={{border:"1px solid "+C.brd,padding:"6px 12px",fontSize:11,lineHeight:"20px",background:C.wh}}>
        <div style={{display:"flex",gap:16}}><span style={{width:60}}>PLC :</span><span>1.42</span></div>
        <div style={{display:"flex",gap:16}}><span style={{width:60}}>HMI :</span><span>1.35</span></div>
        <div style={{display:"flex",gap:16}}><span style={{width:60}}>VLIB :</span><span>4.38.19.2</span></div>
        <div style={{display:"flex",gap:16}}><span style={{width:60}}>ALIGNIF :</span><span>2.19</span></div></div>
    </div>
  </div>;
}

// ══════ 2. HOME RETURN ══════
function HomeReturnTab(){
  const [am,setAm]=useState({});
  const [vp,setVp]=useState("OFF");
  const toggle=id=>{setAm(p=>({...p,[id]:!p[id]}));};
  const bw=126,bh=44,gap=6;
  const HB=({id,nm,big})=><div style={{display:"inline-flex",flexDirection:"column",alignItems:"center",
    justifyContent:"center",width:big?140:bw,height:bh,
    background:am[id]?"#80c020":C.motor,border:"2px solid #666",cursor:"pointer",
    fontWeight:700,textAlign:"center",lineHeight:"14px",userSelect:"none"}}
    onClick={()=>toggle(id)}>
    <span style={{fontSize:10,color:"#333"}}>{id}</span>
    <span style={{fontSize:10,color:"#000"}}>{nm}</span></div>;
  return <div style={{padding:"10px 20px"}}>
    {/* Row: ALL AXES left, VACUUM PUMP after gap */}
    <div style={{display:"flex",alignItems:"flex-start",marginBottom:16}}>
      <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",
        width:bw,height:bh,background:C.cya,color:C.wh,border:"2px solid #666",
        fontWeight:700,fontSize:13,cursor:"pointer",userSelect:"none"}}
        onClick={()=>{const all={};["M01","M02","M05","M03","M04","M11","M12","M07",
          "M21","M22","M25","M23","M24","M31","M32","M26","M27","M28","M29","M34","M30",
          "M91","M92","M93","LP","AL"].forEach(k=>all[k]=true);setAm(all);}}>ALL AXES</div>
      <div style={{marginLeft:120,textAlign:"center"}}>
        <div style={{fontWeight:700,fontSize:12,marginBottom:4}}>VACUUM PUMP</div>
        <div style={{display:"flex",gap:gap}}>
          <div onClick={()=>setVp("ON")} style={{width:100,height:bh,display:"inline-flex",alignItems:"center",justifyContent:"center",
            background:vp==="ON"?"#00a000":"#386838",color:C.wh,border:vp==="ON"?"2px solid #00c000":"2px solid #666",
            fontWeight:700,fontSize:13,cursor:"pointer"}}>ON</div>
          <div onClick={()=>setVp("OFF")} style={{width:100,height:bh,display:"inline-flex",alignItems:"center",justifyContent:"center",
            background:vp==="OFF"?"#00c000":"#386838",color:C.wh,border:vp==="OFF"?"2px solid #00e000":"2px solid #666",
            fontWeight:700,fontSize:13,cursor:"pointer"}}>OFF</div>
        </div>
      </div>
    </div>
    {/* FLUX PARTS */}
    <div style={{fontWeight:700,fontSize:12,marginBottom:6}}>FLUX PARTS</div>
    <div style={{display:"flex",gap:gap,flexWrap:"wrap",marginBottom:4}}>
      <HB id="M01" nm="FLUX STAGE X"/><HB id="M02" nm="FLUX STAGE Y"/><HB id="M05" nm="FLUX STAGE θ"/>
      <HB id="M03" nm="FLUX STAGE Z"/><HB id="M04" nm="FLUX SUPPORT Z"/><HB id="M11" nm="FLUX CAMERA X"/>
      <HB id="M12" nm="FLUX CAMERA Y"/></div>
    <div style={{display:"flex",gap:gap,marginBottom:16}}>
      <HB id="M07" nm="FLUX SQUEEGEE Y"/></div>
    {/* BALL PARTS */}
    <div style={{fontWeight:700,fontSize:12,marginBottom:6}}>BALL PARTS</div>
    <div style={{display:"flex",gap:gap,flexWrap:"wrap",marginBottom:4}}>
      <HB id="M21" nm="BALL STAGE X"/><HB id="M22" nm="BALL STAGE Y"/><HB id="M25" nm="BALL STAGE θ"/>
      <HB id="M23" nm="BALL STAGE Z"/><HB id="M24" nm="B-STAGE SUPPORT Z"/><HB id="M31" nm="BALL CAMERA X"/>
      <HB id="M32" nm="BALL CAMERA Y"/></div>
    <div style={{display:"flex",gap:gap,marginBottom:16}}>
      <HB id="M26" nm="BALL X"/><HB id="M27" nm="BALL Y"/><HB id="M28" nm="BALL Z"/>
      <HB id="M29" nm="REMOVE NOZZLE Z"/><HB id="M34" nm="BALL SUPPLY X"/><HB id="M30" nm="B-MASK CAMERA X"/></div>
    {/* TRANSFER PARTS */}
    <div style={{fontWeight:700,fontSize:12,marginBottom:6}}>TRANSFER PARTS</div>
    <div style={{display:"flex",gap:gap,alignItems:"center"}}>
      <HB id="M91" nm="WAFER ROBOT Z"/><HB id="M92" nm="WAFER ROBOT θ"/><HB id="M93" nm="WAFER ROBOT R"/>
      <div style={{width:80}}/>
      <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",
        width:140,height:bh,background:am["LP"]?"#80c020":C.motor,border:"2px solid #666",
        cursor:"pointer",fontWeight:700,fontSize:12,userSelect:"none"}}
        onClick={()=>toggle("LP")}>LOAD PORT</div>
      <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",
        width:140,height:bh,background:am["AL"]?"#80c020":C.motor,border:"2px solid #666",
        cursor:"pointer",fontWeight:700,fontSize:12,userSelect:"none"}}
        onClick={()=>toggle("AL")}>ALIGNER</div>
    </div>
  </div>;
}

// ══════ 3. AUTO ══════
function AutoTab(){
  const [sub,setSub]=useState("PRODUCT");
  const [mode,setMode]=useState("FLUX\nONLY");
  const [cnt,setCnt]=useState({iw:0,ok:3,ng:0,sqCnt:0,sqMax:9999,fmClnCnt:0,fmClnMax:0,bmClnCnt:0,bmClnMax:0,fluxTimer:"35366:47",fluxTimerSet:"0:00"});
  return <div>
    <SubTabs tabs={["PRODUCT","PRODUCT INFO","IMAGE","TIME","POS CHECK"]} active={sub} onSelect={setSub}/>
    {sub==="PRODUCT"&&<AutoProduct mode={mode} setMode={setMode}/>}
    {sub==="PRODUCT INFO"&&<AutoProductInfo cnt={cnt} setCnt={setCnt}/>}
    {sub==="IMAGE"&&<AutoImage/>}
    {sub==="TIME"&&<AutoTime/>}
    {sub==="POS CHECK"&&<AutoPosCheck/>}
  </div>;
}

function AutoProduct({mode,setMode}){
  const ModeBtn=({t,active,onClick})=><div onClick={onClick} style={{
    padding:"6px 14px",background:C.blu,color:C.wh,border:active?"3px solid #00ff00":"3px solid #333",
    fontWeight:700,fontSize:12,cursor:"pointer",textAlign:"center",whiteSpace:"pre-wrap",
    minWidth:80,minHeight:38,display:"inline-flex",alignItems:"center",justifyContent:"center",lineHeight:"15px"}}>{t}</div>;
  const Ind=({t,on})=><div style={{padding:"1px 12px",background:on?"#00c000":"#c00000",color:C.wh,
    fontWeight:700,fontSize:9,border:"1px solid #555",display:"inline-block"}}>{t}</div>;
  return <div style={{display:"flex",gap:12}}>
    <div style={{width:620}}>
      {/* RUN MODE */}
      <div style={{border:"1px solid #888",padding:8,marginBottom:6}}>
        <div style={{fontWeight:700,fontSize:11,marginBottom:6}}>RUN MODE</div>
        <div style={{display:"flex",gap:8}}>
          <ModeBtn t={"FLUX\nONLY"} active={mode==="FLUX\nONLY"} onClick={()=>setMode("FLUX\nONLY")}/>
          <ModeBtn t={"BALL\nONLY"} active={mode==="BALL\nONLY"} onClick={()=>setMode("BALL\nONLY")}/>
          <ModeBtn t={"PASS\nMODE"} active={mode==="PASS\nMODE"} onClick={()=>setMode("PASS\nMODE")}/></div>
      </div>
      {/* WaferState */}
      <div style={{border:"1px solid #888",padding:6,marginBottom:6,width:170}}>
        <div style={{fontWeight:700,fontSize:10}}>WaferState</div>
        <div style={{fontSize:10,lineHeight:"16px"}}>
          <div>10:NG wafer</div><div>11:MZ picked up</div><div>12:Aligned</div>
          <div>13:Flux printed</div><div>14:Ball mounted</div></div>
      </div>
      {/* Bottom row: WAFER INFORMATION + MASK MONITOR STOP side by side */}
      <div style={{display:"flex",gap:8}}>
        {/* WAFER INFORMATION */}
        <div style={{border:"1px solid #888",padding:8,flex:1}}>
          <div style={{fontWeight:700,fontSize:11,marginBottom:6}}>WAFER INFORMATION</div>
          {/* ALIGNER */}
          <div style={{textAlign:"center",fontWeight:700,fontSize:10,marginBottom:3}}>ALIGNER</div>
          <div style={{textAlign:"center",marginBottom:4}}>
            <Ind t="DATA" on={false}/></div>
          <div style={{display:"flex",justifyContent:"center",gap:6,fontSize:9,marginBottom:10}}>
            <span style={{fontWeight:700}}>State</span><IF v="0" w={30}/><IF v="" w={50}/>
            <span style={{fontWeight:700,marginLeft:8}}>No</span><IF v="0" w={30}/></div>
          {/* Three columns */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:0,textAlign:"center"}}>
            <span style={{fontWeight:700,fontSize:10}}>FLUX STAGE</span>
            <span style={{fontWeight:700,fontSize:10}}>ROBOT</span>
            <span style={{fontWeight:700,fontSize:10}}>BALL STAGE</span></div>
          <div style={{height:6}}/>
          {/* SENSOR row */}
          <div style={{display:"grid",gridTemplateColumns:"60px 1fr 1fr 1fr",alignItems:"start",gap:0,marginBottom:4}}>
            <span style={{fontWeight:700,fontSize:9}}>SENSOR</span>
            <div style={{textAlign:"center"}}><Ind t="PAD" on={false}/><div style={{height:2}}/><Ind t="STAGE" on={false}/></div>
            <div style={{textAlign:"center"}}><Ind t="ARM" on={true}/></div>
            <div style={{textAlign:"center"}}><Ind t="PAD" on={false}/><div style={{height:2}}/><Ind t="STAGE" on={true}/></div>
          </div>
          {/* DATA row */}
          <div style={{display:"grid",gridTemplateColumns:"60px 1fr 1fr 1fr",alignItems:"center",gap:0,marginBottom:6}}>
            <span style={{fontWeight:700,fontSize:9}}>DATA</span>
            <div style={{textAlign:"center"}}><Ind t="DATA" on={false}/></div>
            <div style={{textAlign:"center"}}><Ind t="DATA" on={true}/></div>
            <div style={{textAlign:"center"}}><Ind t="DATA" on={false}/></div>
          </div>
          {/* State / No under each */}
          <div style={{display:"grid",gridTemplateColumns:"60px 1fr 1fr 1fr",gap:0,fontSize:9}}>
            <div/>
            <div style={{textAlign:"center"}}><div>State <IF v="0" w={24}/></div><div>No <IF v="0" w={24}/></div></div>
            <div style={{textAlign:"center"}}><div>State <IF v="0" w={24}/></div><div>No <IF v="0" w={24}/></div></div>
            <div style={{textAlign:"center"}}><div>State <IF v="1" w={24}/></div><div>No <IF v="99" w={24}/></div></div>
          </div>
        </div>
        {/* MASK MONITOR STOP */}
        <div style={{border:"1px solid #888",padding:8,minWidth:200}}>
          <div style={{fontWeight:700,fontSize:11,marginBottom:6}}>MASK MONITOR STOP</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
            <Btn t="PRE-MOUNT" c={C.grn}/><Btn t="AFT-MOUNT" c={C.grn}/>
            <Btn t={"SCREEN\nCHG. ←"} c={C.grn}/><Btn t={"SCREEN\nCHG. →"} c={C.grn}/>
            <Btn t={"MONITOR1\nPOSITION"} c={C.grn}/><Btn t={"MONITOR2\nPOSITION"} c={C.grn}/>
            <Btn t={"MONITOR3\nPOSITION"} c={C.grn}/><Btn t={"MONITOR4\nPOSITION"} c={C.grn}/>
          </div>
          <div style={{marginTop:4}}><Btn t={"MONI 5-10\nPOSITION"} c={C.grn}/></div>
        </div>
      </div>
    </div>
    <StepsPanel/>
  </div>;
}

function AutoProductInfo({cnt,setCnt}){
  const [rk,setRk]=useState(0);
  const reset=(key,val)=>{setCnt(p=>({...p,[key]:val}));setRk(k=>k+1);};
  const [rk2,setRk2]=useState({sq:0,fmc:0,bmc:0,fmt:0});
  const clr="#c09020";
  const CBtn=({onClick})=><td style={{paddingLeft:8}}><div onClick={onClick} style={{
    padding:"4px 14px",background:clr,color:"#fff",fontWeight:700,fontSize:12,
    cursor:"pointer",border:"2px solid #906818",textAlign:"center",whiteSpace:"nowrap"}}>CLEAR</div></td>;
  return <div style={{border:"1px solid #888",padding:"6px 10px",width:"75%"}}>
    <div style={{fontWeight:700,fontSize:12,marginBottom:6}}>PRODUCT INFO</div>
    <table cellSpacing={0} cellPadding={0}><tbody>
      <tr>
        <td style={{verticalAlign:"top",paddingRight:24}}>
          <table cellSpacing={0} cellPadding={0}><tbody>
            {[["MOUNT CYCLE TIME","0.0","S"],["RUNNING TIME","0:00:00",""],["WPH","0","sheet"],["---","0",""]].map((r,i)=>
              <tr key={i}>
                <td style={{fontWeight:700,fontSize:11,paddingRight:8,paddingBottom:6,whiteSpace:"nowrap"}}>{r[0]}</td>
                <td style={{paddingBottom:6}}><IF v={r[1]} w={55}/></td>
                <td style={{fontSize:10,paddingLeft:4,paddingBottom:6}}>{r[2]}</td></tr>)}
            {[["FLUX MASK\nCLEAN FREQUENCY","0","0"],["BALL MASK\nCLEAN FREQUENCY","0","0"]].map((r,i)=>
              <tr key={"c"+i}>
                <td style={{fontWeight:700,fontSize:10,paddingRight:8,paddingBottom:6,whiteSpace:"pre-wrap",lineHeight:"13px"}}>{r[0]}</td>
                <td colSpan={2} style={{paddingBottom:6,fontSize:10,whiteSpace:"nowrap"}}><IF v={r[1]} w={30}/> / <IF v={r[2]} w={30}/> count</td></tr>)}
          </tbody></table>
        </td>
        <td style={{verticalAlign:"top"}}>
          <table cellSpacing={0} cellPadding={0}><tbody>
            {[["INPUT WAFER",cnt.iw,"iw"],["OK WAFER",cnt.ok,"ok"],["NG WAFER",cnt.ng,"ng"]].map(r=>
              <tr key={r[0]+rk}>
                <td style={{fontWeight:700,fontSize:11,paddingRight:8,paddingBottom:14,whiteSpace:"nowrap"}}>{r[0]}</td>
                <td style={{paddingBottom:14}}><IF v={r[1]} w={55}/></td>
                <td style={{fontSize:10,paddingLeft:4,paddingRight:8,paddingBottom:14}}>sheet</td>
                <CBtn onClick={()=>reset(r[2],0)}/></tr>)}
            {[["FLUX SQUEEGEE COUNT","0","9999","sq"],["FLUX MASK CLEANNING COUNT","0","0","fmc"],
              ["BALL MASK CLEANNING COUNT","0","9999","bmc"],["FLUX MANAGEMENT TIMER","35366:47","0:00","fmt"]].map((r,i)=>
              <React.Fragment key={r[3]+rk2[r[3]]}>
                <tr><td colSpan={4} style={{fontWeight:700,fontSize:11,paddingTop:i?6:0,paddingBottom:3}}>{r[0]}</td></tr>
                <tr><td colSpan={3} style={{paddingBottom:10,fontSize:10,whiteSpace:"nowrap"}}><IF v={r[1]} w={55}/> / <IF v={r[2]} w={55}/> count</td>
                  <CBtn onClick={()=>setRk2(p=>({...p,[r[3]]:p[r[3]]+1}))}/></tr>
              </React.Fragment>)}
          </tbody></table>
        </td>
      </tr>
    </tbody></table>
  </div>;
}

function AutoImage(){
  return <div>
    <div style={{display:"flex",gap:2}}>
      {[1,2,3,4].map(n=>{
        const hasFeed=n>=3;
        return <div key={n} style={{flex:1,border:hasFeed?"2px solid #00c000":"1px solid "+C.brd}}>
          <div style={{background:"#d0d0d0",padding:"2px 6px",fontSize:10,fontWeight:700}}>Camera{n} view window</div>
          <div style={{display:"flex",gap:8,fontSize:9,padding:"1px 4px",background:"#e8e8e8",borderBottom:"1px solid "+C.brd}}>
            <span>File</span><span>Image</span><span>View</span><span>Command</span></div>
          <div style={{height:220,background:"#000",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
            {hasFeed?<div style={{color:"#555",fontSize:10,position:"absolute",bottom:4,left:4}}>
              {n===3?"Ball mask pattern":"Wafer PAD view"}</div>

function ManualIO(){
  const [sub,setSub]=useState("I/O2");
  const [bits]=useState(()=>{const b={};for(let i=0;i<600;i++)b[i]=Math.random()>0.55;return b;});
  const BitGrid=({label,idx})=><div style={{marginBottom:12,minWidth:170}}>
    <div style={{fontWeight:700,fontSize:11,marginBottom:3}}>{label}</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(8,26px)",gap:1}}>
      {Array.from({length:16},(_,i)=><div key={i} style={{width:26,height:22,display:"flex",alignItems:"center",justifyContent:"center",
        fontSize:10,fontWeight:700,border:"1px solid #888",background:bits[(idx*16+i)%600]?"#00c000":"#e0e0e0",
        color:bits[(idx*16+i)%600]?"#fff":"#666"}}>{i+1}</div>)}</div></div>;
  const io2=[["X00E0-X00EF","X0130-X013F","X02C0-X02CF"],["X00F0-X00FF","X0220-X022F","X02D0-X02DF"],
    ["X0100-X010F","X0230-X023F","X0330-X033F"],["X0110-X011F","X0240-X024F","X0340-X034F"],["X0120-X012F","X0250-X025F"]];
  return <div><SubTabs tabs={["I/O1","I/O2"]} active={sub} onSelect={setSub}/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 30px"}}>
      {io2.map((row,ri)=>row.map((label,ci)=><BitGrid key={label} label={label} idx={ri*3+ci}/>))}</div></div>;
}
